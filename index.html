<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GastoPro Purple v11</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --success: #34C759; --purple: #AF52DE; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont; background: var(--bg); margin: 0; padding: 0; color: var(--text); height: 100vh; overflow: hidden; }
        .view { display: none; height: calc(100vh - 85px); overflow-y: auto; padding: 20px; padding-top: env(safe-area-inset-top); -webkit-overflow-scrolling: touch; }
        .view.active { display: block; }
        .card { background: var(--card); padding: 18px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 16px; }
        h2 { margin-top: 0; font-size: 1.4rem; font-weight: 700; }
        label { font-size: 0.75rem; color: #8E8E93; font-weight: 600; text-transform: uppercase; display: block; margin: 10px 0 4px 4px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #D1D1D6; font-size: 16px; background: #FFF; margin-bottom: 4px; display: block; height: 48px; appearance: none; -webkit-appearance: none; }
        .send-container { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 10px; }
        .btn-send-icon { background: var(--success); color: white; width: 50px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; margin-bottom: 4px; cursor: pointer; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 17px; font-weight: 600; cursor: pointer; }
        
        /* PURPLE BUTTON CONFIRMATION */
        .btn-camera { background: var(--purple) !important; color: white !important; margin-top: 10px; font-size: 14px; padding: 10px; }
        
        .btn-delete { background: #FF3B3015; color: #FF3B30; width: auto; padding: 6px 12px; font-size: 12px; border-radius: 8px; font-weight: 600; border: none; }
        .chart-wrapper { position: relative; height: 280px; width: 100%; }
        .history-item { background: white; padding: 14px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #E5E5EA; }
        .history-flex { display: flex; justify-content: space-between; align-items: center; }
        .history-amount { font-weight: 700; font-size: 1.1rem; }
        .history-meta { font-size: 0.85rem; color: #8E8E93; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); display: flex; border-top: 0.5px solid #A7A7AA; padding-bottom: env(safe-area-inset-bottom); z-index: 9999; }
        .nav-item { flex: 1; text-align: center; padding: 10px 0; color: #8E8E93; font-size: 11px; font-weight: 500; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 2px; }
        #status { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; z-index: 10000; display: none; }
    </style>
</head>
<body>
    <div id="status"></div>
    <div id="view-registro" class="view active">
        <h2>Nuevo Gasto</h2>
        <div class="card">
            <label>Monto ($)</label>
            <div class="send-container">
                <input type="number" id="amount" placeholder="0.00" inputmode="decimal" enterkeyhint="send">
                <div class="btn-send-icon" onclick="saveExpense()">🚀</div>
            </div>
            <label>Categoría</label>
            <select id="category">
                <option>Pelo</option><option>Comida</option><option>Regalo</option><option>Auto</option>
                <option>Ropa</option><option>Super</option><option>Entretenimiento</option><option>Salud</option>
                <option>Depa</option><option>Gasolina</option><option>Tienda de conveniencia</option><option>Viajes</option>
                <option>Deporte</option><option>Fiesta</option><option>Taxi</option><option>Vuelo</option>
                <option>Tintorería</option><option>Hipoteca</option><option>Compras varias</option>
            </select>
            <label>Fecha</label>
            <input type="date" id="dateInput">
            <label>Descripción</label>
            <textarea id="description" rows="1" placeholder="Opcional..."></textarea>
            <button class="btn-camera" onclick="document.getElementById('cameraInput').click()">📸 Escanear Recibo</button>
            <input type="file" id="cameraInput" accept="image/*" capture="camera" style="display:none" onchange="simulateOCR()">
        </div>
    </div>
    <div id="view-reportes" class="view">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <h2>Reportes</h2>
            <button onclick="fetchFromCloud()" style="width:auto; padding:6px 12px; font-size:12px; background:#E5E5EA; color:black; border-radius: 8px;">🔄 Sincronizar</button>
        </div>
        <div class="card">
            <div class="chart-wrapper"><canvas id="barChart"></canvas></div>
        </div>
        <div id="historyList"></div>
    </div>
    <nav class="nav-bar">
        <div class="nav-item active" id="nav-reg" onclick="switchTab('registro')"><span class="nav-icon">✍️</span>Registro</div>
        <div class="nav-item" id="nav-rep" onclick="switchTab('reportes')"><span class="nav-icon">📊</span>Reportes</div>
    </nav>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaatOmgdIHuqHHFLpmP-jSEucg9E12cQUuNd5gQ-AkVgcVG13sza5R0ba1tnPEIV-z/exec";
        
        document.getElementById('dateInput').valueAsDate = new Date();
        
        async function saveExpense() {
            const amtField = document.getElementById('amount');
            const val = parseFloat(amtField.value);
            if(!val) return;
            const expense = {
                date: document.getElementById('dateInput').value,
                amount: val,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value || ""
            };
            showStatus("Guardando...");
            try {
                await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(expense) });
                amtField.value = "";
                document.getElementById('description').value = "";
                showStatus("✅ Guardado");
                setTimeout(() => switchTab('reportes'), 500);
            } catch (err) {
                showStatus("❌ Error");
            }
        }

        async function fetchFromCloud() {
            showStatus("Sincronizando...");
            try {
                const resp = await fetch(SCRIPT_URL + "?nocache=" + new Date().getTime());
                const data = await resp.json();
                localStorage.setItem('expenses', JSON.stringify(data));
                renderAll();
                showStatus("✅ Sincronizado");
            } catch (err) {
                showStatus("❌ Error");
            }
        }

        async function deleteFromCloud(item) {
            if(!confirm("¿Borrar?")) return;
            showStatus("Borrando...");
            
            // We only send the rowId now - no more searching!
            const payload = { 
                action: "delete", 
                rowId: item.rowId 
            };
            
            try {
                await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
                // Force a delay so Google can finish the delete before we fetch
                setTimeout(fetchFromCloud, 2500); 
            } catch (err) {
                showStatus("❌ Error");
            }
        }

        function renderAll() {
            const raw = localStorage.getItem('expenses') || "[]";
            const data = JSON.parse(raw);
            const list = document.getElementById('historyList');
            
            list.innerHTML = data.slice().reverse().map((e) => {
                const cleanDate = String(e.date).split('T')[0];
                return `
                <div class="history-item">
                    <div class="history-flex">
                        <div>
                            <span class="history-amount">$${Number(e.amount).toFixed(2)}</span>
                            <span class="history-meta" style="color:var(--primary); font-weight:600; margin-left:8px;">${e.category}</span>
                        </div>
                        <button class="btn-delete" onclick='deleteFromCloud(${JSON.stringify(e)})'>Borrar</button>
                    </div>
                    <div class="history-meta" style="margin-top:4px;">${cleanDate} ${e.description ? '• ' + e.description : ''}</div>
                </div>
            `}).join('');
            renderChart(data);
        }

        function renderChart(data) {
            const ctx = document.getElementById('barChart').getContext('2d');
            const months = [];
            for (let i = 3; i >= 0; i--) {
                const d = new Date(); d.setMonth(d.getMonth() - i);
                months.push(d.toISOString().substring(0, 7));
            }
            const cats = [...new Set(data.map(e => e.category))];
            const colors = ['#007AFF', '#34C759', '#FF9500', '#FF3B30', '#AF52DE', '#5856D6', '#FFCC00', '#8E8E93'];
            const ds = cats.map((c, idx) => ({
                label: c,
                data: months.map(m => data.filter(e => String(e.date).startsWith(m) && e.category === c).reduce((s, e) => s + Number(e.amount), 0)),
                backgroundColor: colors[idx % colors.length]
            }));
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: months.map(m => m.split('-')[1] + '/' + m.split('-')[0].substring(2)), datasets: ds },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true, grid: {display:false} }, y: { stacked: true, beginAtZero: true } }, plugins: { legend: { display: false } } }
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            document.getElementById('nav-' + t.substring(0,3)).classList.add('active');
            if(t === 'reportes') fetchFromCloud();
        }

        function showStatus(m) {
            const s = document.getElementById('status');
            s.innerText = m; s.style.display = 'block';
            setTimeout(() => s.style.display = 'none', 3000);
        }

        function simulateOCR() {
            showStatus("Escaneando...");
            setTimeout(() => { document.getElementById('amount').value = (Math.random()*150 + 20).toFixed(2); showStatus("Detectado"); }, 800);
        }
        renderAll();
    </script>
</body>
</html>
