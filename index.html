<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpendTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; }
        body { font-family: -apple-system, system-ui; background: var(--bg); margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .receipt-preview { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; display: none; margin-top: 10px; }
        h2 { margin-top: 0; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Add Expense</h2>
        <input type="number" id="amount" placeholder="Amount ($)" inputmode="decimal">
        <select id="category">
            <option value="Food">🍔 Food</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Discretionary">🎮 Discretionary</option>
            <option value="Bills">📑 Bills</option>
        </select>
        <button onclick="document.getElementById('cameraInput').click()">📸 Take Receipt Photo</button>
        <input type="file" id="cameraInput" accept="image/*" capture="camera" style="display:none" onchange="previewImage(this)">
        <img id="preview" class="receipt-preview">
        <button style="background: #34C759;" onclick="saveExpense()">Save Transaction</button>
    </div>

    <div class="card">
        <h2>Monthly Breakdown</h2>
        <canvas id="spendChart"></canvas>
    </div>

    <script>
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        let receiptBase64 = null;

        function previewImage(input) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('preview').src = e.target.result;
                document.getElementById('preview').style.display = 'block';
                receiptBase64 = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function saveExpense() {
            const expense = {
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                date: new Date().toISOString(),
                receipt: receiptBase64
            };
            if(!expense.amount) return alert("Enter an amount");
            expenses.push(expense);
            localStorage.setItem('expenses', JSON.stringify(expenses));
            location.reload(); // Refresh to update chart
        }

        // Simple Chart implementation
        const ctx = document.getElementById('spendChart').getContext('2d');
        const totals = expenses.reduce((acc, curr) => {
            acc[curr.category] = (acc[curr.category] || 0) + curr.amount;
            return acc;
        }, {});

        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(totals),
                datasets: [{ data: Object.values(totals), backgroundColor: ['#FF3B30', '#FF9500', '#007AFF', '#5856D6'] }]
            }
        });
    </script>
</body>
</html>
